files:
  species_file: data/CBSQB3_2019.10.25.txt # Molecular database
  res_file: output/result.out
  executor: Demo
  species_smiles: "CC" # SMILES wrapped by quotes, multiple species split by space/tab
  calc_value: -19.28 # Calculated value (kcal/mol)
  
rxn_constraints:
  no_of_cores: 4
  same_coef: true
  no_species: 4
  complete_set: false
  stochastic: true
  no_trials: 1000
  seed: 42
  
  # Atom constraints
  lone_electron: false
  electron_pair: true
  electron_pair_type: false
  atom_with_hydro: false
  atom_hybridization: false
  atom_hybrid_with_hydro: false
  atom_degree: false
  atom_type: C
  radical: false
  
  # Bond constraints
  bond_type:
    hydro_bond: true
    normal_bond: true
    bond_hybridization: false
    bond_with_hydro: false
    bond_degree: false
    bond_radical: false
    bond_atom_type: C 
    ring: false
    
similarity:
  similarity_on: true
  radius: 4
  chirality: true
  feature_method: HRCF

analysis:
  analysis_on: true
  filter: true
  top: 0.1